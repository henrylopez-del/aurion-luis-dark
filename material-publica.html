function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  curso.forEach(modulo => {
    const moduleEl = document.createElement('div');
    moduleEl.className = 'nav-module';
    const header = document.createElement('div');
    header.className = 'nav-module-header';
    header.innerHTML = `<span><span class="nav-module-num">${modulo.modulo}</span> ${modulo.titulo}</span>`;
    header.onclick = () => {
      const l = moduleEl.querySelector('.nav-lessons');
      l.style.maxHeight = l.style.maxHeight ? '' : l.scrollHeight + 'px';
    };
    const lessons = document.createElement('div');
    lessons.className = 'nav-lessons';
    lessons.style.maxHeight = '500px';
    modulo.lecciones.forEach(leccion => {
      const idx = allLessons.findIndex(l => l.id === leccion.id);
      const item = document.createElement('div');
      item.className = 'nav-lesson' + (idx === currentLesson ? ' active' : '') + (completed.has(idx) ? ' completed' : '');
      item.innerHTML = `<div class="lesson-dot"></div>${leccion.titulo}`;
      item.onclick = () => goToLesson(idx);
      lessons.appendChild(item);
    });
    moduleEl.appendChild(header);
    moduleEl.appendChild(lessons);
    nav.appendChild(moduleEl);
  });
}

  const area = document.getElementById('content-area');

function goToLesson(idx) {
  if (idx < 0 || idx >= allLessons.length) return;
  completed.add(currentLesson);
  currentLesson = idx;
  // Trigger del popup Brevo a mitad de curso (lección 7 — Carrusel de 7 slides, índice 6)
  if (idx === 6 && !progressModalShown) {
    setTimeout(function() {
      document.getElementById('progress-modal').classList.add('active');
    }, 600);
  }
  renderLesson(idx);
  renderSidebar();
  updateProgress();
  closeSidebar();
}

  completed.add(idx);

function updateProgress() {
  const done = completed.size;
  const total = allLessons.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total;
}

function handleQuiz(btn, isCorrect) {
  const block = btn.closest('.quiz-block');
  const blockId = block.id || ('quiz-' + currentLesson);
  if (!block.id) block.id = blockId;
  block.querySelectorAll('.quiz-option').forEach(o => { o.disabled = true; o.style.pointerEvents = 'none'; });
  btn.classList.add(isCorrect ? 'quiz-correct' : 'quiz-incorrect');
  const fb = block.querySelector('.quiz-feedback');
  fb.className = 'quiz-feedback ' + (isCorrect ? 'fb-correct' : 'fb-incorrect');
  if (isCorrect) {
    fb.textContent = btn.dataset.correct;
    quizPassed.add(currentLesson);
  } else {
    fb.innerHTML = btn.dataset.incorrect + '<br><br><button onclick="resetQuiz(\'' + blockId + '\')" style="margin-top:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#fca5a5;padding:7px 18px;border-radius:6px;font-family:DM Sans,sans-serif;font-size:13px;cursor:pointer;">↩ Volver a intentar</button>';
  }
}

function resetQuiz(blockId) {
  const block = document.getElementById(blockId);
  block.querySelectorAll('.quiz-option').forEach(o => {
    o.disabled = false;
    o.style.pointerEvents = '';
    o.classList.remove('quiz-correct', 'quiz-incorrect');
  });
  const fb = block.querySelector('.quiz-feedback');
  fb.className = 'quiz-feedback';
  fb.innerHTML = '';
}

function handleChallenge(btn, success) {
  const block = btn.closest('.challenge-block');
  block.querySelectorAll('button').forEach(b => {
    b.disabled = true;
    b.style.pointerEvents = 'none';
    b.style.opacity = '0.5';
  });
  const resp = block.querySelector('.challenge-response');
  if (success) {
    resp.className = 'challenge-response success';
    resp.innerHTML = '<strong>¡Increíble!</strong> Cuando un guion fluye al leerlo en voz alta, sonará natural en el Reel. Ese test es el filtro más importante para que no se note que usaste IA — porque la cámara amplifica cualquier frase que no sea tuya.';

function copyPrompt(btn) {
  const pre = btn.closest('.prompt-box').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.textContent = '¡Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function generateCert() {
  const name = document.getElementById('cert-name').value.trim();
  const certEmail = document.getElementById('cert-email').value.trim();
  if (!name) { document.getElementById('cert-name').focus(); return; }
  if (certEmail && certEmail.includes('@')) {
    var bf = new FormData();
    bf.append('EMAIL', certEmail);
    bf.append('FIRSTNAME', name);
    bf.append('email_address_check', '');
    bf.append('locale', 'es');
    fetch(BREVO_URL, { method: 'POST', body: bf, mode: 'no-cors' }).catch(function(){});
  }
  const dateStr = new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' });
  closeCertModal();
  const loader = document.createElement('div');
  loader.style.cssText = 'position:fixed;inset:0;background:rgba(7,9,15,0.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#EEF4F8;font-family:DM Sans,sans-serif;font-size:15px;gap:14px;';
  loader.innerHTML = '<div style="font-size:36px;">🐧</div><div>Generando tu certificado...</div>';
  document.body.appendChild(loader);
  let auryBase64 = '';
  try {
    const resp = await fetch('assets/img/Aury-enfrente-de-la-Compu.webp');
    const blob = await resp.blob();
    auryBase64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(blob); });
  } catch(e) {}
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;left:-9999px;top:0;width:1200px;height:848px;z-index:-1;';
  div.innerHTML = certHTML(name, dateStr, auryBase64);
  document.body.appendChild(div);
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 400));
  const canvas = await html2canvas(div, { scale:2, useCORS:true, allowTaint:true, backgroundColor:'#07090F', width:1200, height:848, logging:false });
  document.body.removeChild(div);
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 297, 210);
  pdf.save('Certificado_AuryOnTech_' + name.replace(/ /g,'_') + '.pdf');
  loader.remove();
}

function closeCertModal() { document.getElementById('cert-overlay').classList.remove('active'); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }

updateProgress();

(function() {
  const dot = document.createElement('div'); dot.className = 'cursor-dot';
  const ring = document.createElement('div'); ring.className = 'cursor-ring';
  document.body.appendChild(dot);
  document.body.appendChild(ring);
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx + 'px'; dot.style.top = my + 'px'; });
  document.addEventListener('mousedown', () => { dot.classList.add('clicking'); ring.classList.add('clicking'); });
  document.addEventListener('mouseup', () => { dot.classList.remove('clicking'); ring.classList.remove('clicking'); });
  (function animateRing() { rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(animateRing); })();
})();
</script>
