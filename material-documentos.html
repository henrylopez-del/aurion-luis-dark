  <style>
    :root {
      --ink:#000000; --dawn:#C46030; --dawn-l:#D88050; --dawn-ll:#ECA878;
      --sky:#3A6494; --ice:#B8D4EC; --snow:#EEF4F8; --bone:#EDE4D8;
      --warm:#7A6E60; --ink-2:#0f1219; --ink-3:#161b26; --sidebar-w:300px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;background:#000000;color:var(--snow);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.7;overflow:hidden;}

    #progress-bar{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--dawn),var(--dawn-ll));z-index:1000;transition:width 0.4s ease;}

    .app{display:flex;height:100vh;padding-top:3px;}
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--ink-2);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;overflow:hidden;z-index:100;}
    .sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.06);}
    .sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .logo-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
    .logo-icon img{width:40px;height:40px;object-fit:contain;display:block;}
    .logo-text{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:15px;color:var(--snow);letter-spacing:-0.3px;}
    .course-title{font-size:12px;color:var(--warm);line-height:1.4;font-weight:400;}
    .progress-info{margin-top:12px;display:flex;align-items:center;justify-content:space-between;}
    .progress-label{font-size:11px;color:var(--warm);font-family:'DM Mono',monospace;}
    .progress-pill{font-size:11px;color:var(--dawn-ll);font-family:'DM Mono',monospace;font-weight:500;}
    .progress-track{margin-top:8px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--dawn);border-radius:2px;transition:width 0.4s ease;}

    .sidebar-nav{flex:1;overflow-y:auto;padding:12px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;}
    .nav-module{margin-bottom:4px;}
    .nav-module-header{padding:8px 20px;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--warm);font-family:'DM Mono',monospace;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
    .nav-module-header:hover{color:var(--dawn-ll);}
    .nav-module-num{color:var(--dawn);font-weight:500;}
    .nav-lessons{overflow:hidden;transition:max-height 0.3s ease;}
    .nav-lesson{padding:8px 20px 8px 32px;font-size:13px;color:rgba(238,244,248,0.6);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.2s;border-left:2px solid transparent;line-height:1.4;}
    .nav-lesson:hover{color:var(--snow);background:rgba(255,255,255,0.03);}
    .nav-lesson.active{color:var(--dawn-ll);border-left-color:var(--dawn);background:rgba(196,96,48,0.08);}
    .nav-lesson.completed .lesson-dot{background:var(--dawn);}
    .lesson-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);flex-shrink:0;transition:background 0.2s;}

    .main{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;}
    .content{max-width:760px;margin:0 auto;padding:48px 40px 80px;}

    .lesson{display:none;}
    .lesson.active{display:block;animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    .lesson-breadcrumb{font-size:12px;color:var(--warm);font-family:'DM Mono',monospace;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
    .breadcrumb-sep{color:var(--dawn);}
    .lesson-title{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:36px;line-height:1.1;color:var(--snow);margin-bottom:12px;letter-spacing:-0.5px;}
    .lesson-objective{font-size:15px;color:var(--dawn-ll);margin-bottom:36px;padding:14px 18px;background:rgba(196,96,48,0.08);border-left:3px solid var(--dawn);border-radius:0 6px 6px 0;font-style:italic;}
    .lesson-body{font-size:15px;color:rgba(238,244,248,0.85);line-height:1.8;}
    .lesson-body h3{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--snow);margin:36px 0 14px;letter-spacing:-0.3px;}
    .lesson-body p{margin-bottom:16px;}
    .lesson-body ul,.lesson-body ol{margin:0 0 16px 20px;}
    .lesson-body li{margin-bottom:8px;}
    .lesson-body strong{color:var(--snow);font-weight:600;}

    .module-header{background:var(--ink-3);border-left:4px solid var(--dawn);border-radius:0 12px 12px 0;padding:20px 24px;margin-bottom:36px;}
    .module-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--dawn);font-weight:500;letter-spacing:1px;text-transform:uppercase;}
    .module-name{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:14px;color:var(--warm);margin-top:4px;}

    .lesson-hero{width:100%;height:220px;border-radius:12px;overflow:hidden;position:relative;margin-bottom:36px;background:var(--ink-3);}
    .lesson-hero img{width:100%;height:100%;object-fit:cover;display:block;}
    .lesson-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(7,9,15,0.85),transparent);pointer-events:none;}
    .lesson-hero.broken{display:none;}

    .code-box{background:#0d1117;border-radius:10px;margin:20px 0;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}
    .code-box-header{padding:10px 16px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;}
    .code-box-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--warm);text-transform:uppercase;letter-spacing:1px;}
    .copy-btn{font-family:'DM Mono',monospace;font-size:11px;color:var(--dawn-ll);background:none;border:1px solid rgba(196,96,48,0.3);padding:3px 10px;border-radius:4px;cursor:pointer;transition:all 0.2s;}
    .copy-btn:hover{background:rgba(196,96,48,0.15);border-color:var(--dawn);}
    .copy-btn.copied{color:#4ade80;border-color:rgba(74,222,128,0.3);}
    .code-box pre{padding:20px;overflow-x:auto;font-family:'DM Mono',monospace;font-size:13px;line-height:1.7;color:#e6edf3;white-space:pre-wrap;}

    .inline-code{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:2px 7px;font-family:'DM Mono',monospace;font-size:12px;color:var(--dawn-ll);}

    .callout{padding:16px 20px;border-radius:8px;margin:20px 0;font-size:14px;line-height:1.6;}
    .callout-error{background:rgba(239,68,68,0.08);border-left:3px solid #ef4444;color:#fca5a5;}
    .callout-tip{background:rgba(58,100,148,0.12);border-left:3px solid var(--sky);color:var(--ice);}
    .callout-warning{background:rgba(196,96,48,0.1);border-left:3px solid var(--dawn);color:var(--dawn-ll);}
    .callout-success{background:rgba(74,222,128,0.07);border-left:3px solid #4ade80;color:#86efac;}
    .callout strong{display:block;margin-bottom:4px;font-weight:600;}

    .action-block{background:linear-gradient(135deg,rgba(196,96,48,0.12),rgba(196,96,48,0.05));border:1px solid rgba(196,96,48,0.25);border-radius:12px;padding:24px 28px;margin-top:40px;}
    .action-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--dawn);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .action-label::before{content:'';display:inline-block;width:16px;height:2px;background:var(--dawn);}
    .action-title{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--snow);margin-bottom:12px;}
    .action-steps{list-style:none;margin:0;padding:0;}
    .action-steps li{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:14px;color:rgba(238,244,248,0.8);display:flex;align-items:flex-start;gap:12px;}
    .action-steps li:last-child{border-bottom:none;}
    .step-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--dawn);font-weight:500;min-width:20px;margin-top:2px;}

    .step-list{display:flex;flex-direction:column;gap:6px;margin:24px 0;}
    .step-item{display:flex;gap:16px;padding:14px 16px;background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid rgba(255,255,255,0.04);align-items:flex-start;transition:background 0.2s;}
    .step-item:hover{background:rgba(255,255,255,0.04);}
    .step-number-big{width:28px;height:28px;background:var(--dawn);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--snow);flex-shrink:0;margin-top:2px;}
    .step-content{flex:1;}
    .step-content strong{display:block;font-size:15px;color:var(--snow);margin-bottom:3px;}
    .step-content p{font-size:13px;color:rgba(238,244,248,0.6);margin:0;line-height:1.5;}

    .flujo-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px;}
    .flujo-table th{background:rgba(196,96,48,0.08);color:var(--dawn-l);font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;padding:10px 14px;text-align:left;border-bottom:1px solid rgba(196,96,48,0.2);}
    .flujo-table td{padding:10px 14px;color:rgba(238,244,248,0.75);border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top;font-family:'DM Mono',monospace;font-size:12px;}
    .flujo-table tr:last-child td{border-bottom:none;}
    .flujo-table td:first-child{color:var(--dawn-ll);font-weight:500;}
    .flujo-table .badge-inside{background:rgba(58,100,148,0.2);color:var(--ice);border-radius:4px;padding:2px 6px;font-size:10px;}
    .flujo-table .badge-outside{background:rgba(45,158,107,0.15);color:#3DBE88;border-radius:4px;padding:2px 6px;font-size:10px;}

    .config-block{background:var(--ink-3);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px 24px;margin:16px 0;}
    .config-block-title{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:.9rem;color:var(--dawn-ll);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .config-block-title::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--dawn);flex-shrink:0;}
    .config-row{display:flex;gap:16px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);align-items:flex-start;}
    .config-row:last-child{border-bottom:none;}
    .config-key{font-family:'DM Mono',monospace;font-size:11px;color:var(--warm-l);min-width:160px;flex-shrink:0;padding-top:2px;}
    .config-val{font-size:13px;color:rgba(238,244,248,0.8);line-height:1.5;}
    .config-val code{font-family:'DM Mono',monospace;font-size:11px;color:var(--dawn-ll);background:rgba(196,96,48,0.1);padding:1px 5px;border-radius:3px;}

    .error-block{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:12px;padding:16px 20px;margin:12px 0;}
    .error-title{font-family:'DM Mono',monospace;font-size:11px;color:#ef4444;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
    .error-causa{font-size:13px;color:#fca5a5;margin-bottom:6px;}
    .error-sol{font-size:13px;color:#86efac;}
    .error-sol strong{color:#4ade80;}

    .quiz-block{background:rgba(58,100,148,0.08);border:1px solid rgba(58,100,148,0.2);border-radius:12px;padding:24px 28px;margin:32px 0;}
    .quiz-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--sky);margin-bottom:16px;}
    .quiz-question{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--snow);margin-bottom:16px;line-height:1.3;}
    .quiz-options{display:flex;flex-direction:column;gap:8px;}
    .quiz-option{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 16px;text-align:left;color:rgba(238,244,248,0.8);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all 0.2s;line-height:1.5;}
    .quiz-option:hover:not(:disabled){background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2);color:var(--snow);}
    .quiz-option.quiz-correct{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.4);color:#86efac;}
    .quiz-option.quiz-incorrect{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.3);color:#fca5a5;}
    .quiz-feedback{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:14px;line-height:1.5;display:none;}
    .quiz-feedback.fb-correct{background:rgba(74,222,128,0.08);color:#86efac;border-left:3px solid #4ade80;display:block;}
    .quiz-feedback.fb-incorrect{background:rgba(239,68,68,0.08);color:#fca5a5;border-left:3px solid #ef4444;display:block;}

    .checklist-block{background:rgba(196,96,48,0.06);border:1px solid rgba(196,96,48,0.2);border-radius:12px;padding:20px 24px;margin:28px 0;}
    .checklist-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dawn);margin-bottom:14px;font-weight:500;}
    .checklist-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
    .checklist-item:last-child{border-bottom:none;}
    .checklist-item input[type="checkbox"]{width:17px;height:17px;cursor:pointer;accent-color:var(--dawn);flex-shrink:0;}
    .checklist-item label{font-size:14px;color:rgba(238,244,248,0.8);cursor:pointer;transition:all 0.2s;}
    .checklist-item input:checked + label{color:var(--dawn-ll);text-decoration:line-through;opacity:0.6;}

    .casos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0;}
    .caso-card{background:var(--ink-3);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 16px;transition:border-color .2s;}
    .caso-card:hover{border-color:var(--border-dawn);}
    .caso-sector{font-family:'DM Mono',monospace;font-size:10px;color:var(--dawn-l);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
    .caso-doc{font-size:13px;color:var(--snow);font-weight:500;margin-bottom:4px;}
    .caso-desc{font-size:12px;color:var(--warm-l);line-height:1.4;}

    .next-course{background:linear-gradient(135deg,var(--ink-3),rgba(196,96,48,0.08));border:1px solid rgba(196,96,48,0.2);border-radius:16px;padding:32px;margin:40px 0;}
    .next-course-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dawn);margin-bottom:10px;}
    .next-course-title{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:24px;color:var(--snow);margin-bottom:10px;letter-spacing:-0.3px;}
    .next-course-desc{font-size:14px;color:rgba(238,244,248,0.7);margin-bottom:20px;line-height:1.6;}
    .next-course-btn{display:inline-block;background:var(--dawn);color:var(--snow);padding:11px 24px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:14px;text-decoration:none;transition:background 0.2s;}
    .next-course-btn:hover{background:var(--dawn-l);}

    .lesson-nav{display:flex;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.06);}
    .nav-btn{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:10px 20px;border-radius:8px;cursor:pointer;border:none;transition:all 0.2s;}
    .nav-btn-prev{background:rgba(255,255,255,0.05);color:var(--warm);}
    .nav-btn-prev:hover{background:rgba(255,255,255,0.09);color:var(--snow);}
    .nav-btn-next{background:var(--dawn);color:var(--snow);}
    .nav-btn-next:hover{background:var(--dawn-l);}
    .nav-btn:disabled{opacity:0.3;cursor:not-allowed;}

    .hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--ink-2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;width:40px;height:40px;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
    .hamburger span{display:block;width:18px;height:2px;background:var(--snow);border-radius:2px;}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:90;}

    .cert-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;display:none;align-items:center;justify-content:center;}
    .cert-overlay.active{display:flex;}
    .cert-modal{background:var(--ink-2);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:36px;max-width:440px;width:90%;text-align:center;}
    .cert-modal-title{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:24px;color:var(--snow);margin-bottom:8px;}
    .cert-modal-sub{font-size:14px;color:var(--warm);margin-bottom:24px;line-height:1.5;}
    .cert-name-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:12px 16px;color:var(--snow);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;margin-bottom:16px;}
    .cert-name-input:focus{border-color:var(--dawn);}
    .cert-name-input::placeholder{color:var(--warm);}
    .cert-generate-btn{width:100%;background:var(--dawn);color:var(--snow);border:none;border-radius:8px;padding:13px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;cursor:pointer;transition:background 0.2s;}
    .cert-generate-btn:hover{background:var(--dawn-l);}
    .cert-skip{margin-top:12px;font-size:13px;color:var(--warm);cursor:pointer;text-decoration:underline;}
    .cert-skip:hover{color:var(--snow);}
    .certificate{display:none;}

    *{cursor:none !important;}
    a,button,[onclick],label,input[type="checkbox"],.nav-lesson,.nav-module-header,.quiz-option,.copy-btn,.cert-generate-btn,.cert-skip,.nav-btn,.next-course-btn{cursor:pointer !important;}

Opción 2: Windows + S → escribe "Power Automate" → Enter

        contenido: `

            <div class="module-num">Módulo 02</div>

&lt;&lt;FECHAHOY&gt;&gt;   → se reemplaza con el valor de la columna FECHAHOY del Excel

let currentLesson = 0;
const allLessons = curso.flatMap(m => m.lecciones);
const completed = new Set();

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  curso.forEach(modulo => {
    const moduleEl = document.createElement('div');
    moduleEl.className = 'nav-module';
    const header = document.createElement('div');
    header.className = 'nav-module-header';
    header.innerHTML = `<span><span class="nav-module-num">${modulo.modulo}</span> ${modulo.titulo}</span>`;
    header.onclick = () => {
      const l = moduleEl.querySelector('.nav-lessons');
      l.style.maxHeight = l.style.maxHeight ? '' : l.scrollHeight + 'px';
    };
    const lessons = document.createElement('div');
    lessons.className = 'nav-lessons';
    lessons.style.maxHeight = '500px';
    modulo.lecciones.forEach(leccion => {
      const idx = allLessons.findIndex(l => l.id === leccion.id);
      const item = document.createElement('div');
      item.className = 'nav-lesson' + (idx === currentLesson ? ' active' : '') + (completed.has(idx) ? ' completed' : '');
      item.innerHTML = `<div class="lesson-dot"></div>${leccion.titulo}`;
      item.onclick = () => goToLesson(idx);
      lessons.appendChild(item);
    });
    moduleEl.appendChild(header);
    moduleEl.appendChild(lessons);
    nav.appendChild(moduleEl);
  });
}

function renderLesson(idx) {
  const area = document.getElementById('content-area');
  const leccion = allLessons[idx];
  const modulo = curso.find(m => m.lecciones.some(l => l.id === leccion.id));
  area.innerHTML = `
    <div class="lesson active">
      <div class="lesson-breadcrumb">
        <span>Módulo ${modulo.modulo}</span>
        <span class="breadcrumb-sep">›</span>
        <span>Lección ${idx + 1} de ${allLessons.length}</span>
      </div>
      <h1 class="lesson-title">${leccion.titulo}</h1>
      <div class="lesson-objective">${leccion.objetivo}</div>
      <div class="lesson-body">${leccion.contenido}</div>
      <div class="lesson-nav">
        <button class="nav-btn nav-btn-prev" onclick="goToLesson(${idx-1})" ${idx===0?'disabled':''}>← Anterior</button>
        <button class="nav-btn nav-btn-next" onclick="nextLesson(${idx})">
          ${idx === allLessons.length-1 ? '¡Completado! 🐧' : 'Siguiente →'}
        </button>
      </div>
    </div>`;
  document.getElementById('main-content').scrollTop = 0;
}

function goToLesson(idx) {
  if (idx < 0 || idx >= allLessons.length) return;
  completed.add(currentLesson);
  currentLesson = idx;
  renderLesson(idx);
  renderSidebar();
  updateProgress();
  closeSidebar();
}

function nextLesson(idx) {
  completed.add(idx);
  if (idx < allLessons.length - 1) {
    goToLesson(idx + 1);
  } else {
    updateProgress();
    renderSidebar();
    document.getElementById('cert-overlay').classList.add('active');
  }
}

function updateProgress() {
  const done = completed.size;
  const total = allLessons.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total;
}

function handleQuiz(btn, isCorrect) {
  const block = btn.closest('.quiz-block');
  block.querySelectorAll('.quiz-option').forEach(o => { o.disabled = true; o.style.pointerEvents = 'none'; });
  btn.classList.add(isCorrect ? 'quiz-correct' : 'quiz-incorrect');
  const fb = block.querySelector('.quiz-feedback');
  fb.className = 'quiz-feedback ' + (isCorrect ? 'fb-correct' : 'fb-incorrect');
  fb.textContent = isCorrect ? btn.dataset.correct : btn.dataset.incorrect;
}

function copyCode(btn) {
  const pre = btn.closest('.code-box').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.textContent = '¡Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function generateCert() {
  const name = document.getElementById('cert-name').value.trim();
  if (!name) { document.getElementById('cert-name').focus(); return; }
  const dateStr = new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' });
  closeCertModal();
  const loader = document.createElement('div');
  loader.style.cssText = 'position:fixed;inset:0;background:rgba(7,9,15,0.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#EEF4F8;font-family:DM Sans,sans-serif;font-size:15px;gap:14px;';
  loader.innerHTML = '<div style="font-size:36px;">🐧</div><div>Generando tu certificado...</div>';
  document.body.appendChild(loader);
  let auryBase64 = '';
  try {
    const resp = await fetch('assets/img/Aury-enfrente-de-la-Compu.webp');
    const blob = await resp.blob();
    auryBase64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(blob); });
  } catch(e) {}
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;left:-9999px;top:0;width:1200px;height:848px;z-index:-1;';
  div.innerHTML = certHTML(name, dateStr, auryBase64);
  document.body.appendChild(div);
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 400));
  const canvas = await html2canvas(div, { scale:2, useCORS:true, allowTaint:true, backgroundColor:'#07090F', width:1200, height:848, logging:false });
  document.body.removeChild(div);
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 297, 210);
  pdf.save('Certificado_AuryOnTech_' + name.replace(/ /g,'_') + '.pdf');
  loader.remove();
}

function closeCertModal() { document.getElementById('cert-overlay').classList.remove('active'); }

(function() {
  const dot = document.createElement('div'); dot.className = 'cursor-dot';
  const ring = document.createElement('div'); ring.className = 'cursor-ring';
  document.body.appendChild(dot);
  document.body.appendChild(ring);
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx + 'px'; dot.style.top = my + 'px'; });
  document.addEventListener('mousedown', () => { dot.classList.add('clicking'); ring.classList.add('clicking'); });
  document.addEventListener('mouseup', () => { dot.classList.remove('clicking'); ring.classList.remove('clicking'); });
  (function animateRing() { rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(animateRing); })();
})();
